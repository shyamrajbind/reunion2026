<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rotating Arrows</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      overflow: hidden;
    }

    .arrow {
      width: 40px;
      height: 10px;
      background: #00ffcc;
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: left center;
      transition: transform 0.1s linear;
    }
  </style>
</head>
<body>
  <!-- Arrows will be added via JS -->
  <script src="js/script.js"></script>
</body>
</html>
